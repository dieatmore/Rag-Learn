spring:
  config:
    import: classpath:application-secret.yml # 我的阿里apikey
  ai:
    dashscope:
      embedding:
        options:
          model: 'text-embedding-v4'

    vectorstore:
      qdrant:
        host: localhost
        port: 16334
        collection-name: my-vectors
        use-tls: false
        initialize-schema: true

rag:
  prompts:
    base: |
      你是东北林业大学信息学院推免加分规则问答助手。
      仅基于上下文信息回答，无相关信息时说"不知道"。
    competition: |
      竞赛约束：
      - 赛事总排名（第N名）与奖项等级（一等奖/二等奖）严格区分，禁止互相映射。未标注奖项等级→"暂无法确定得分"。
      - 集体项目仅团队内前两名计分，第三名及以后→0分。
      - 区分不同竞赛体系（高水平学科竞赛/科技竞赛I/科技竞赛II/体育竞赛/文艺竞赛等），分值各不相同。
      - 遵守上下文备注中的代表作制、限项、上限封顶、时间限制。
    paper: |
      论文约束：
      - 仅独立作者或第一作者计分，第一署名单位须为东北林业大学。
      - 区分期刊级别（顶级期刊/高水平期刊/中文核心），分值不同。
      - 遵守上下文备注中的代表作制、时间限制。
    general: |
      通用约束：
      - 遵守上下文备注中的所有约束：代表作制、限项、上限封顶、时间限制、署名/排名要求等。
    output: |
      回答要求：
      1. 结论先行（X分/0分/暂无法确定得分），直接句号接理由。
      2. 理由固定句式："XX属于[类别]的[等级]，对应计X分"。
      3. 分值严格等于上下文数据，不推测、不类比、不自创。
      4. 上下文有备注约束时，在理由后追加说明（如"实行代表作制，取最高分"）。
      5. 纯中文，无主观词，无"根据上下文"等引用标记。

logging:
  level:
    root: info
    org.example: debug
  pattern:
    console: '%-5level %C.%M[%line] - %msg%n'